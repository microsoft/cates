name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Uses release-please-config.json and .release-please-manifest.json
          # at the repository root.
          token: ${{ secrets.GITHUB_TOKEN }}
