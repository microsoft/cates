{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cates.fullname" . }}-egress
  labels:
    {{- include "cates.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cates.selectorLabels" . | nindent 6 }}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        {{- toYaml .Values.networkPolicy.egressPorts | nindent 8 }}
{{- end }}
